<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control Panel - Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e2e8f0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .panel {
            width: 100%;
            max-width: 450px;
            background: rgba(8, 30, 41, 0.9);
            border: 1px solid #134357;
            border-radius: 12px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .title {
            text-align: center;
            color: #5cf4f1;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .divider {
            height: 1px;
            background: #134357;
            margin: 15px 0;
        }

        .section-title {
            color: #94a3b8;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-label {
            color: #94a3b8;
        }

        .status-value {
            color: #10b981;
            font-weight: bold;
            text-align: right;
        }

        .status-value.row {
            color: #6366f1;
        }

        .status-value.slot {
            color: #6366f1;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 12px;
            color: #ef4444;
            margin-bottom: 15px;
            display: none;
        }

        .error-box.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: 2px solid;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-enable {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .btn-enable:hover {
            background: #059669;
        }

        .btn-disable {
            background: #64748b;
            border-color: #64748b;
            color: white;
        }

        .btn-disable:hover {
            background: #475569;
        }

        .btn-danger {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-mode {
            background: #6366f1;
            border-color: #6366f1;
            color: white;
        }

        .btn-mode:hover {
            background: #4f46e5;
        }

        .btn-mode.ai {
            background: #8b5cf6;
            border-color: #8b5cf6;
        }

        .btn-mode.ai:hover {
            background: #7c3aed;
        }

        .btn-camera {
            background: #06b6d4;
            border-color: #06b6d4;
            color: white;
        }

        .btn-camera:hover {
            background: #0891b2;
        }

        .grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 15px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 15px;
        }

        .btn-small {
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.2s;
        }

        .btn-small:active {
            transform: scale(0.95);
        }

        .btn-row-select {
            background: #fbbf24;
            border-color: #f59e0b;
            color: #0d1117;
        }

        .btn-row-select:hover {
            background: #f59e0b;
        }

        .btn-slot-select {
            background: #2dd4bf;
            border-color: #14b8a6;
            color: #0d1117;
        }

        .btn-slot-select:hover {
            background: #14b8a6;
        }

        .info-text {
            text-align: center;
            color: #94a3b8;
            font-size: 11px;
            font-style: italic;
            margin-top: 15px;
        }

        .console {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            max-height: 200px;
            background: #1a1f2e;
            border: 1px solid #134357;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }

        .console-line {
            margin-bottom: 4px;
            color: #10b981;
        }
    </style>
</head>

<body>
    <div class="panel">
        <div class="title">🤖 ROBOT CONTROL</div>
        <div class="divider"></div>

        <!-- System Status -->
        <div class="status-grid">
            <span class="status-label">Status:</span>
            <span class="status-value" id="status">IDLE</span>

            <span class="status-label">Row:</span>
            <span class="status-value row" id="row">3</span>

            <span class="status-label">Slot:</span>
            <span class="status-value slot" id="slot">5</span>
        </div>

        <!-- Error Display -->
        <div class="error-box" id="errorBox"></div>

        <div class="divider"></div>

        <!-- System Control -->
        <div class="section-title">System Control</div>
        <button class="btn btn-enable" onclick="enableSystem(true)">▶️ Enable System</button>
        <button class="btn btn-disable" onclick="enableSystem(false)">⏸️ Disable System</button>
        <button class="btn btn-danger" onclick="emergencyStop()">🛑 Emergency Stop</button>

        <div class="divider"></div>

        <!-- Mode Control -->
        <div class="section-title">Operation Mode</div>
        <div class="btn-row">
            <button class="btn btn-mode" onclick="setMode('manual')">🎮 Manual</button>
            <button class="btn btn-mode ai" onclick="setMode('ai')">🤖 AI</button>
        </div>

        <div class="divider"></div>

        <!-- Camera Control -->
        <div class="section-title">Camera Control</div>
        <div class="btn-row">
            <button class="btn btn-camera" onclick="switchCamera(0)">📹 Cam 0</button>
            <button class="btn btn-camera" onclick="switchCamera(1)">📹 Cam 1</button>
        </div>

        <div class="divider"></div>

        <!-- Row Selection -->
        <div class="section-title">Select Input Row</div>
        <div class="grid-5">
            <button class="btn-small btn-row-select" onclick="selectRow(1)">1</button>
            <button class="btn-small btn-row-select" onclick="selectRow(2)">2</button>
            <button class="btn-small btn-row-select" onclick="selectRow(3)">3</button>
            <button class="btn-small btn-row-select" onclick="selectRow(4)">4</button>
            <button class="btn-small btn-row-select" onclick="selectRow(5)">5</button>
        </div>

        <div class="divider"></div>

        <!-- Slot Selection -->
        <div class="section-title">Select Output Slot</div>
        <div class="grid-4">
            <button class="btn-small btn-slot-select" onclick="selectSlot(1)">1</button>
            <button class="btn-small btn-slot-select" onclick="selectSlot(2)">2</button>
            <button class="btn-small btn-slot-select" onclick="selectSlot(3)">3</button>
            <button class="btn-small btn-slot-select" onclick="selectSlot(4)">4</button>
            <button class="btn-small btn-slot-select" onclick="selectSlot(5)">5</button>
            <button class="btn-small btn-slot-select" onclick="selectSlot(6)">6</button>
            <button class="btn-small btn-slot-select" onclick="selectSlot(7)">7</button>
            <button class="btn-small btn-slot-select" onclick="selectSlot(8)">8</button>
        </div>

        <div class="divider"></div>

        <div class="info-text">Preview Mode - Check console (bottom right) for button clicks</div>
    </div>

    <div class="console" id="console">
        <div style="color: #5cf4f1; margin-bottom: 8px;">📊 Console Output:</div>
    </div>

    <script>
        function log(message) {
            const console = document.getElementById('console');
            const line = document.createElement('div');
            line.className = 'console-line';
            line.textContent = '> ' + message;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        function enableSystem(enable) {
            const status = document.getElementById('status');
            status.textContent = enable ? 'RUNNING' : 'STOPPED';
            log(`✅ enableSystem(${enable})`);
            hideError();
        }

        function emergencyStop() {
            const status = document.getElementById('status');
            const errorBox = document.getElementById('errorBox');
            status.textContent = 'EMERGENCY_STOP';
            errorBox.textContent = '⚠️ Emergency stop activated!';
            errorBox.classList.add('show');
            log('🛑 emergencyStop()');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        function setMode(mode) {
            log(`🎯 setMode(${mode})`);
        }

        function switchCamera(id) {
            log(`📹 switchCamera(${id})`);
        }

        function selectRow(row) {
            document.getElementById('row').textContent = row;
            log(`📥 selectRow(${row})`);
        }

        function selectSlot(slot) {
            document.getElementById('slot').textContent = slot;
            log(`📤 selectSlot(${slot})`);
        }

        log('🚀 Preview loaded');
    </script>
</body>

</html>
